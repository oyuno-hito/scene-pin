spring:
  application:
    name: scene-pin-server

  datasource:
    url: jdbc:postgresql://localhost:5432/scenepin
    username: scenepin
    password: scenepin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

storage:
  base-path: ./data/videos

thumbnail:
  base-path: ./data/thumbnails
