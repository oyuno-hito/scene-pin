spring:
  application:
    name: scene-pin-server

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    url: jdbc:postgresql://localhost:5432/scenepin
    username: scenepin
    password: scenepin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

storage:
  base-url: http://localhost:8080
  video-path: ./data/videos
  thumbnail-path: ./data/thumbnails

video:
  compression:
    enabled: true
    max-width: 1280
    crf: 28
    codec: libx264
  thumbnail:
    width: 320
    height: 180
