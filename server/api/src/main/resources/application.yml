spring:
  application:
    name: scene-pin-server

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scenepin}
    username: ${SPRING_DATASOURCE_USERNAME:scenepin}
    password: ${SPRING_DATASOURCE_PASSWORD:scenepin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  web:
    resources:
      static-locations: ${SPRING_RESOURCES_STATIC_LOCATIONS:classpath:/static/}

server:
  port: ${SERVER_PORT:8080}

storage:
  base-url: ${STORAGE_BASE_URL:http://localhost:8080}
  video-path: ${STORAGE_VIDEO_PATH:./data/videos}
  thumbnail-path: ${STORAGE_THUMBNAIL_PATH:./data/thumbnails}

video:
  compression:
    enabled: true
    max-width: 1280
    crf: 28
    codec: libx264
  thumbnail:
    width: 320
    height: 180

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
