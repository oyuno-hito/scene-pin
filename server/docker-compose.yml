services:
  postgres:
    image: postgres:16-alpine
    container_name: scenepin-postgres
    profiles:
      - dev
    environment:
      POSTGRES_DB: scenepin
      POSTGRES_USER: scenepin
      POSTGRES_PASSWORD: scenepin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scenepin -d scenepin"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ai:
    image: postgres:16-alpine
    container_name: scenepin-postgres-ai
    profiles:
      - ai
    environment:
      POSTGRES_DB: scenepin
      POSTGRES_USER: scenepin
      POSTGRES_PASSWORD: scenepin
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scenepin -d scenepin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
